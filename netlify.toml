[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  BUN_VERSION = "1.2.19"

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'"

# Form handling (if using Netlify forms)
[forms]
  settings = { netlifySiteId = "your-site-id" }

# Function settings (if using Netlify functions)
[functions]
  directory = "netlify/functions"
  
# Dev settings
[dev]
  command = "bun run dev"
  port = 5173
  targetPort = 5173
  autoLaunch = false